version: '3.8'

services:
  devbox:
    image: ubuntu:22.04
    container_name: devbox
    ports:
      - "2222:22"   # SSH
      - "8000:8000" # Backend API
      - "80:80"     # Frontend
    volumes:
      - ./data:/data
      - ./devbox_key.pub:/tmp/devbox_key.pub:ro
    restart: unless-stopped
    privileged: true
    environment:
      - container=docker
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y openssh-server &&
      echo 'PermitRootLogin without-password' >> /etc/ssh/sshd_config &&
      mkdir -p /root/.ssh && chmod 700 /root/.ssh &&
      cat /tmp/devbox_key.pub >> /root/.ssh/authorized_keys &&
      chmod 600 /root/.ssh/authorized_keys &&
      service ssh start &&
      tail -f /dev/null
      "
