version: '3.8'

services:
  backend:
    build: ./backend
    container_name: points-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/data/points.db
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: points-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
