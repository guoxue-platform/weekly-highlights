version: '3.8'

services:
  devbox:
    image: ubuntu:22.04
    container_name: devbox
    ports:
      - "2222:22"   # SSH
      - "8000:8000" # Backend API
      - "80:80"     # Frontend
    volumes:
      - ./data:/data
    restart: unless-stopped
    # 启用 systemd (Docker-in-Docker)
    privileged: true
    environment:
      - container=docker
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y openssh-server &&
      echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
      echo 'root:dev1234' | chpasswd &&
      service ssh start &&
      echo 'DevBox is ready on port 2222' &&
      tail -f /dev/null
      "
